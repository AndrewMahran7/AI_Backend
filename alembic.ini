# Alembic configuration file.

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Truncate long revision identifiers to 12 characters.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command.
revision_environment = false

# Set to 'true' to allow .hierarchical revisions to be created.
sourceless = false

# Version number format (defaults to %%d).
# version_num_format =

# Output encoding.
output_encoding = utf-8

# SQLAlchemy connection URL – overridden at runtime from app settings.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/ai_backend


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
